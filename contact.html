<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - QuoteBot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-white dark">
  <header class="py-4 px-6">
    <nav class="flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold">QuoteBot</a>
      <a href="features.html" class="bg-blue-600 px-4 py-2 rounded">Features</a>
    </nav>
  </header>

  <main class="py-16 px-6">
    <h1 class="text-4xl font-bold mb-8 text-center">Contact Us</h1>
    <form action="#" class="max-w-lg mx-auto bg-gray-800 p-6 rounded shadow">
      <div class="mb-4">
        <label for="name" class="block text-gray-300 mb-2">Name</label>
        <input type="text" id="name" name="name" class="w-full px-4 py-2 rounded bg-gray-700 text-white" required>
      </div>
      <div class="mb-4">
        <label for="email" class="block text-gray-300 mb-2">Email</label>
        <input type="email" id="email" name="email" class="w-full px-4 py-2 rounded bg-gray-700 text-white" required>
      </div>
      <div class="mb-4">
        <label for="message" class="block text-gray-300 mb-2">Message</label>
        <textarea id="message" name="message" class="w-full px-4 py-2 rounded bg-gray-700 text-white" rows="4" required></textarea>
      </div>
      <button type="submit" class="bg-blue-600 px-6 py-3 rounded text-white">Send Message</button>
    </form>
    <div class="text-center mt-8">
      <p>Email: <a href="mailto:quotebot@lazylion.xyz" class="text-blue-400">quotebot@lazylion.xyz</a></p>
      <div class="flex justify-center space-x-4 mt-4">
        <a href="#" class="text-gray-400 hover:text-white">Twitter</a>
        <a href="#" class="text-gray-400 hover:text-white">LinkedIn</a>
      </div>
    </div>
  </main>

  <footer class="py-8 px-6 bg-gray-800 text-center">
    <p>&copy; 2024 QuoteBot. All rights reserved.</p>
  </footer>
</body>
</html>
